<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" role="img" aria-labelledby="title desc">
  <title id="title">Vintage wooden television frame</title>
  <desc id="desc">A transparent SVG television frame with an open screen window for video.</desc>
  <defs>
    <linearGradient id="wood" x1="0" x2="1">
      <stop offset="0" stop-color="#4f160e"/>
      <stop offset=".2" stop-color="#8f3420"/>
      <stop offset=".48" stop-color="#57180f"/>
      <stop offset=".72" stop-color="#a44426"/>
      <stop offset="1" stop-color="#46110c"/>
    </linearGradient>
    <linearGradient id="woodGlow" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#d17a48" stop-opacity=".6"/>
      <stop offset=".45" stop-color="#6a1e13" stop-opacity="0"/>
      <stop offset="1" stop-color="#2a0705" stop-opacity=".55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#2b160f" flood-opacity=".42"/>
    </filter>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency=".018 .18" numOctaves="2" seed="11" result="noise"/>
      <feBlend in="SourceGraphic" in2="noise" mode="soft-light"/>
    </filter>
    <mask id="frameMask">
      <rect width="1000" height="650" rx="22" fill="white"/>
      <rect x="90" y="74" width="652" height="474" rx="72" fill="black"/>
    </mask>
  </defs>
  <g filter="url(#shadow)">
    <rect x="18" y="18" width="964" height="602" rx="24" fill="url(#wood)" mask="url(#frameMask)"/>
    <rect x="18" y="18" width="964" height="602" rx="24" fill="url(#woodGlow)" mask="url(#frameMask)" opacity=".9"/>
    <rect x="30" y="30" width="940" height="578" rx="18" fill="none" stroke="#e0aa61" stroke-width="5" opacity=".7"/>
    <rect x="50" y="48" width="900" height="542" rx="15" fill="none" stroke="#290805" stroke-width="7" opacity=".85"/>
    <rect x="73" y="57" width="686" height="510" rx="86" fill="none" stroke="#160504" stroke-width="28"/>
    <rect x="88" y="72" width="656" height="480" rx="74" fill="none" stroke="#82716b" stroke-width="10" opacity=".75"/>
    <g transform="translate(770 58)">
      <rect width="178" height="510" rx="8" fill="#4b120d" stroke="#d29b58" stroke-width="3"/>
      <rect x="18" y="36" width="142" height="160" rx="5" fill="#35100d" opacity=".9"/>
      <g stroke="#7d3a28" stroke-width="4" opacity=".8">
        <path d="M24 52h130M24 72h130M24 92h130M24 112h130M24 132h130M24 152h130M24 172h130"/>
      </g>
      <text x="89" y="24" text-anchor="middle" fill="#e8c47e" font-family="Georgia,serif" font-size="14" letter-spacing="3">TELEFUNKEN</text>
      <rect x="30" y="226" width="118" height="208" rx="4" fill="#2e0b08" stroke="#a96b42" stroke-width="3"/>
      <g fill="#d8c49a" stroke="#2a0a08" stroke-width="2">
        <circle cx="122" cy="253" r="16"/><circle cx="122" cy="292" r="16"/><circle cx="122" cy="331" r="16"/><circle cx="122" cy="370" r="16"/>
      </g>
      <g fill="#d8b36b">
        <rect x="47" y="248" width="42" height="8" rx="2"/><rect x="47" y="277" width="42" height="8" rx="2"/><rect x="47" y="306" width="42" height="8" rx="2"/><rect x="47" y="335" width="42" height="8" rx="2"/><rect x="47" y="364" width="42" height="8" rx="2"/>
      </g>
      <g fill="#cda866" stroke="#3c100c" stroke-width="3">
        <circle cx="49" cy="474" r="17"/><circle cx="91" cy="474" r="17"/><circle cx="133" cy="474" r="17"/>
      </g>
    </g>
    <path d="M39 59c55-20 99-24 151-20M803 588c58 8 94 8 136-2" stroke="#f0b871" stroke-width="4" opacity=".45" fill="none"/>
  </g>
</svg>